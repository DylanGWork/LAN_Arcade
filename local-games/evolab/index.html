<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="EvoLab - Open source evolution simulator" />
    <title>EvoLab - Evolution Simulator</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-primary: #0a0e27;
        --bg-secondary: rgba(0, 0, 0, 0.85);
        --text-primary: #ffffff;
        --text-secondary: #d0d0d0;
        --accent-primary: #4CAF50;
        --accent-secondary: #2E7D32;
        --border-color: #4CAF50;
      }

      /* High contrast mode */
      body.high-contrast {
        --bg-primary: #000000;
        --bg-secondary: #000000;
        --text-primary: #ffffff;
        --text-secondary: #ffffff;
        --accent-primary: #00ff00;
        --accent-secondary: #00cc00;
        --border-color: #ffffff;
      }

      /* Reduce motion support */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        overflow: hidden;
      }

      /* Font size scaling */
      body.font-size-small {
        font-size: 12px;
      }

      body.font-size-medium {
        font-size: 14px;
      }

      body.font-size-large {
        font-size: 16px;
      }

      body.font-size-xlarge {
        font-size: 18px;
      }

      /* Dyslexia-friendly font */
      body.dyslexia-friendly-font,
      body.dyslexia-friendly-font * {
        font-family: 'OpenDyslexic', 'Comic Sans MS', 'Trebuchet MS', 'Verdana', sans-serif !important;
        letter-spacing: 0.12em;
        word-spacing: 0.16em;
        line-height: 1.5;
      }

      /* Exclude monospace elements from dyslexia font */
      body.dyslexia-friendly-font #hud,
      body.dyslexia-friendly-font #hud *,
      body.dyslexia-friendly-font kbd,
      body.dyslexia-friendly-font code,
      body.dyslexia-friendly-font pre,
      body.dyslexia-friendly-font .monospace {
        font-family: 'Courier New', 'Consolas', 'Monaco', monospace !important;
        letter-spacing: normal !important;
        word-spacing: normal !important;
      }

      #app {
        width: 100vw;
        height: 100vh;
        position: relative;
        overflow: hidden;
      }

      #app canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }

      #hud {
        position: absolute;
        top: 20px;
        left: 20px;
        background: var(--bg-secondary);
        padding: 12px 15px;
        border-radius: 8px;
        border: 2px solid var(--border-color);
        font-size: 13px;
        font-family: 'Courier New', monospace;
        z-index: 100;
        min-width: 240px;
        max-width: 280px;
      }

      #hud h3 {
        margin: 0 0 10px 0;
        font-size: 16px;
        color: var(--accent-primary);
      }

      #hud .stat {
        display: flex;
        justify-content: space-between;
        margin: 4px 0;
        font-size: 12px;
      }

      #hud .stat-label {
        color: var(--text-secondary);
      }

      #hud .stat-value {
        font-weight: bold;
        color: var(--text-primary);
      }

      /* Skip link styles */
      .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: var(--accent-primary);
        color: #000;
        padding: 8px 16px;
        text-decoration: none;
        font-weight: bold;
        z-index: 10000;
        border-radius: 0 0 4px 0;
      }

      .skip-link:focus {
        top: 0;
      }

      /* Focus indicator styles */
      *:focus-visible {
        outline: 3px solid var(--accent-primary);
        outline-offset: 2px;
      }

      button:focus-visible {
        outline: 3px solid var(--accent-primary);
        outline-offset: 2px;
      }

      .bar-container {
        width: 100%;
        height: 10px;
        background: #333;
        border-radius: 5px;
        overflow: hidden;
        margin: 6px 0;
      }

      .bar {
        height: 100%;
        transition: width 0.3s ease;
        border-radius: 6px;
      }

      .bar-atp {
        background: linear-gradient(90deg, #FFD700, #FFA500);
      }

      .bar-health {
        background: linear-gradient(90deg, #4CAF50, #2E7D32);
      }

      #instructions {
        position: absolute;
        bottom: 20px;
        left: 20px;
        background: var(--bg-secondary);
        padding: 12px 15px;
        border-radius: 8px;
        border: 2px solid var(--border-color);
        font-size: 11px;
        z-index: 90;
        max-width: 260px;
      }

      #instructions h4 {
        margin: 0 0 6px 0;
        color: var(--accent-primary);
        font-size: 13px;
      }

      #instructions kbd {
        background: #333;
        padding: 1px 5px;
        border-radius: 3px;
        font-family: monospace;
        margin: 0 1px;
        font-size: 10px;
      }

      #instructions div {
        margin-bottom: 3px;
      }

      .reproduce-button {
        width: 100%;
        margin-top: 15px;
        padding: 12px;
        background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        border: 2px solid var(--border-color);
        border-radius: 8px;
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
        animation: pulse 2s infinite;
      }

      .reproduce-button:hover {
        background: linear-gradient(135deg, var(--accent-secondary), #1b5e20);
        transform: scale(1.05);
      }

      /* Screen reader only text */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @keyframes pulse {
        0%, 100% {
          box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7);
        }
        50% {
          box-shadow: 0 0 0 10px rgba(76, 175, 80, 0);
        }
      }

      @media (max-width: 700px) {
        #hud {
          top: 12px;
          left: 12px;
          width: 200px;
          min-width: 0;
          max-width: 200px;
          padding: 8px 10px;
          font-size: 11px;
        }

        #hud h3 {
          margin-bottom: 6px;
          font-size: 14px;
        }

        #hud .stat {
          margin: 2px 0;
          font-size: 11px;
        }

        .bar-container {
          height: 8px;
          margin: 4px 0;
        }

        #instructions {
          display: none;
        }

        .evolab-main-menu {
          top: 12px !important;
          right: 12px !important;
        }

        .evolab-main-menu > div {
          gap: 8px !important;
        }

        .evolab-main-menu button {
          min-width: 132px !important;
          padding: 8px 10px !important;
          font-size: 12px !important;
        }

        .evolab-biome-legend {
          top: 154px !important;
          right: 12px !important;
          max-width: calc(100vw - 24px) !important;
          max-height: calc(100vh - 230px) !important;
        }

        .evolab-zoom-controls {
          display: none !important;
        }

        .evolab-evolution-controls {
          right: 12px !important;
          bottom: 64px !important;
          padding: 6px 10px !important;
          z-index: 96 !important;
        }

        .evolab-time-controls {
          left: 0 !important;
          right: 0 !important;
          bottom: 0 !important;
          transform: none !important;
          width: 100vw !important;
          max-width: 100vw !important;
          padding: 8px !important;
          border-right: 0 !important;
          border-left: 0 !important;
          border-radius: 0 !important;
          gap: 8px !important;
          justify-content: flex-start !important;
          overflow-x: auto !important;
        }

        .evolab-time-controls button {
          min-width: 52px !important;
          padding: 7px 10px !important;
          font-size: 12px !important;
          white-space: nowrap;
          flex: 0 0 auto;
        }

        .evolab-time-controls span,
        .evolab-time-controls > div {
          white-space: nowrap;
          flex: 0 0 auto;
        }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-DfWdTlXp.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/rolldown-runtime-QTnfLwEv.js">
    <link rel="modulepreload" crossorigin href="./assets/vendor-graphics-Cg4S9coA.js">
    <link rel="modulepreload" crossorigin href="./assets/vendor-audio-OF00h3-L.js">
    <link rel="modulepreload" crossorigin href="./assets/vendor-react-BXfsOOax.js">
    <link rel="modulepreload" crossorigin href="./assets/vendor-data-DRJkNiiY.js">
  </head>
  <body>
    <!-- ARIA live regions for screen reader announcements -->
    <div id="announcer-polite" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    <div id="announcer-assertive" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

    <!-- Skip links for keyboard navigation -->
    <a href="#main-game" class="skip-link">Skip to game</a>
    <a href="#main-menu" class="skip-link" style="left: 140px;">Skip to menu</a>

    <div id="app">
      <aside id="hud" aria-label="Game statistics" role="complementary">
        <h3>🧬 EvoLab</h3>

        <div class="stat">
          <span class="stat-label" id="atp-label">ATP:</span>
          <span class="stat-value" id="atp-value">100</span>
        </div>
        <div class="bar-container">
          <div class="bar bar-atp" id="atp-bar" style="width: 100%"></div>
        </div>

        <div class="stat">
          <span class="stat-label" id="health-label">Health:</span>
          <span class="stat-value" id="health-value">100</span>
        </div>
        <div class="bar-container">
          <div class="bar bar-health" id="health-bar" style="width: 100%"></div>
        </div>

        <div class="stat">
          <span class="stat-label" id="glucose-label">Glucose:</span>
          <span class="stat-value" id="glucose-value">0</span>
        </div>

        <div class="stat">
          <span class="stat-label" id="food-label">Food Eaten:</span>
          <span class="stat-value" id="food-value">0</span>
        </div>

        <div class="stat">
          <span class="stat-label" id="aminoacid-label">Amino Acids:</span>
          <span class="stat-value" id="aminoacid-value">0</span>
        </div>

        <div class="stat">
          <span class="stat-label" id="phosphate-label">Phosphates:</span>
          <span class="stat-value" id="phosphate-value">0</span>
        </div>

        <div class="stat">
          <span class="stat-label">Generation:</span>
          <span class="stat-value" id="generation-value">1</span>
        </div>

        <div class="stat">
          <span class="stat-label">DNA Points:</span>
          <span class="stat-value" id="dna-value">0</span>
        </div>

        <button id="reproduce-btn" class="reproduce-button" style="display: none;">
          🧬 Reproduce!
        </button>
      </aside>

      <main id="main-game" aria-label="Evolution simulator game canvas">
        <!-- Game canvas will be rendered here by PixiJS -->
      </main>

      <aside id="instructions" aria-label="Game controls" role="complementary">
        <h4>Controls</h4>
        <div><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> - Nudge species in Manual Mode</div>
        <div><kbd>Arrows</kbd> - Alternative species nudge</div>
        <div><kbd>Space</kbd> - Pause</div>
        <div>Cyan cells are yours; collect yellow glucose to restore ATP.</div>
      </aside>
    </div>
  </body>
</html>
